# AgentMX Configuration
# Copy as .agentmx.yml to your project root

default_agent: claude-code

agents:
  claude-code:
    command: claude
    enabled: true

  codex:
    command: codex
    args: ["--model", "o4-mini", "-a", "on-request"]
    enabled: true

  aider:
    command: aider
    args: ["--model", "sonnet"]
    enabled: false

router:
  mode: rules   # auto | rules | manual
  rules:
    - match: "—В–µ—Б—В|test|spec|coverage"
      agent: codex
      reason: "Codex is great for test generation"

    - match: "—А–µ—Д–∞–Ї—В–Њ—А–Є–љ–≥|refactor|clean"
      agent: claude-code

    - match: "–і–Њ–Ї—Г–Љ–µ–љ—В–∞—Ж–Є—П|docs|readme|comment"
      agent: claude-code

ui:
  theme: dark
  show_tokens: false
  show_cost: false
